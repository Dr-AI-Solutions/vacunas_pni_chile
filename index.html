<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatVax v3.0 - Campañas & Riesgos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans text-slate-800">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-indigo-600">
        
        <div class="bg-slate-900 p-5 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black text-indigo-400 tracking-tighter">StatVax <span class="text-white font-light italic">CL</span></h1>
                    <p id="display-edad" class="text-slate-400 text-[10px] font-mono mt-1">SISTEMA DE APOYO CLÍNICO 2026</p>
                </div>
                <div class="text-right">
                    <span class="text-[9px] bg-indigo-900 px-2 py-1 rounded-full border border-indigo-700">v3.0 - Campaign Mode</span>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-6 space-y-4">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Fecha de Nacimiento</label>
                        <input type="date" id="dob" onchange="auditar()" class="w-full p-2 border-2 border-indigo-100 rounded-lg text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Género</label>
                        <select id="genero" onchange="auditar()" class="w-full p-2 border-2 border-indigo-100 rounded-lg text-sm">
                            <option value="todos">Todos</option>
                            <option value="femenino">Femenino</option>
                            <option value="masculino">Masculino</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 border-t pt-4">
                    <label class="flex items-center space-x-1 text-[9px] font-bold"><input type="checkbox" id="prematuro" onchange="auditar()"> <span>PREMATURO <1.5kg</span></label>
                    <label class="flex items-center space-x-1 text-[9px] font-bold"><input type="checkbox" id="cronico" onchange="auditar()"> <span>CRÓNICO/INMUNO</span></label>
                    <label class="flex items-center space-x-1 text-[9px] font-bold"><input type="checkbox" id="embarazo" onchange="auditar()"> <span>EMBARAZADA</span></label>
                    <label class="flex items-center space-x-1 text-[9px] font-bold"><input type="checkbox" id="personal" onchange="auditar()"> <span>P. SALUD</span></label>
                    <label class="flex items-center space-x-1 text-[9px] font-bold text-orange-600"><input type="checkbox" id="esViajero" onchange="auditar()"> <span>VIAJE ENDÉMICO</span></label>
                    <label class="flex items-center space-x-1 text-[9px] font-bold"><input type="checkbox" id="esRapaNui" onchange="auditar()"> <span>RAPA NUI</span></label>
                </div>
            </div>

            <div id="resultados" class="hidden space-y-4">
                
                <div id="box-alertas-criticas" class="hidden space-y-2"></div>

                <div id="box-campana" class="bg-indigo-50 border-l-4 border-indigo-600 p-4 rounded-r-lg">
                    <h3 class="text-indigo-900 font-black text-xs uppercase mb-2">📢 Campaña Invierno/Mpox 2026</h3>
                    <ul id="list-campana" class="text-[11px] space-y-1 font-medium italic"></ul>
                </div>

                <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg">
                    <h3 class="text-amber-800 font-black text-xs uppercase mb-2">📅 Próximas PNI (30-90 días)</h3>
                    <div id="list-proyeccion" class="text-xs space-y-1"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-red-50 border-t-2 border-red-500 p-3 rounded-b-lg">
                        <h3 class="text-red-800 font-black text-[10px] uppercase mb-1">🚫 Brecha PNI</h3>
                        <ul id="list-brecha" class="text-[9px] text-red-900 list-disc pl-4"></ul>
                    </div>
                    <div class="bg-emerald-50 border-t-2 border-emerald-500 p-3 rounded-b-lg">
                        <h3 class="text-emerald-800 font-black text-[10px] uppercase mb-1">✅ PNI Histórico</h3>
                        <ul id="list-pasadas" class="text-[9px] text-emerald-700 space-y-0.5"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PNI = [
            { n: "BCG (Tuberculosis)", meses: 0, inicio: 1980, vivo: true },
            { n: "Hepatitis B (RN)", meses: 0, inicio: 2005 },
            { n: "Hexavalente", meses: 2, inicio: 2018 },
            { n: "Tres Vírica (SRP 1ra)", meses: 12, inicio: 1990, vivo: true },
            { n: "Meningocócica ACWY", meses: 12, inicio: 2014 },
            { n: "Hepatitis A", meses: 18, inicio: 2018 },
            { n: "Varicela (1ra)", meses: 18, inicio: 2020, vivo: true },
            { n: "Varicela (2da)", meses: 36, inicio: 2023, vivo: true },
            { n: "Fiebre Amarilla", meses: 18, rapanui: true, vivo: true },
            { n: "VPH", meses: 108, inicio: 2014, gen: "femenino" },
            { n: "VPH", meses: 108, inicio: 2019, gen: "masculino" }
        ];

        function getEdadExacta(dob, hoy) {
            let anios = hoy.getFullYear() - dob.getFullYear();
            let meses = hoy.getMonth() - dob.getMonth();
            let dias = hoy.getDate() - dob.getDate();
            if (dias < 0) { meses--; dias += new Date(hoy.getFullYear(), hoy.getMonth(), 0).getDate(); }
            if (meses < 0) { anios--; meses += 12; }
            return { anios, meses, dias, totalMeses: (anios * 12) + meses };
        }

        function auditar() {
            const dobVal = document.getElementById('dob').value;
            if (!dobVal) return;
            const dob = new Date(dobVal + "T12:00:00");
            const hoy = new Date();
            const edad = getEdadExacta(dob, hoy);
            document.getElementById('display-edad').innerText = `Edad: ${edad.anios}a, ${edad.meses}m, ${edad.dias}d`;
            document.getElementById('resultados').classList.remove('hidden');

            const isCronico = document.getElementById('cronico').checked;
            const isPremanie = document.getElementById('prematuro').checked;
            const isEmbarazada = document.getElementById('embarazo').checked;
            const isSalud = document.getElementById('personal').checked;
            const isViajero = document.getElementById('esViajero').checked;
            const isRapaNui = document.getElementById('esRapaNui').checked;
            const gen = document.getElementById('genero').value;

            const campanas = [], proy = [], brechas = [], pasadas = [], alertas = [];

            // 1. LÓGICA DE CAMPAÑA 2026
            if (edad.totalMeses >= 6 && edad.totalMeses <= 132) campanas.push("Influenza (Grupo Escolar)");
            if (edad.anios >= 60 || isCronico || isEmbarazada || isSalud) campanas.push("Influenza (Grupo Riesgo / Refuerzo 2026)");
            if (isCronico || isSalud) campanas.push("Refuerzo COVID-19 (XBB.1.5 Anual)");
            if (isSalud || isCronico) campanas.push("Mpox (Viruela del Mono) - Evaluar exposición");

            // Nirsevimab (VRS)
            if (edad.totalMeses <= 6 || (isPremanie && edad.totalMeses <= 24)) {
                alertas.push(`<div class="bg-blue-600 text-white p-2 text-[10px] rounded font-bold">⚠️ NIRSEVIMAB (VRS): Corresponde por campaña 2026. Priorizar en prematuros <32s o <1.5kg.</div>`);
            }

            // 2. LÓGICA PNI & VIRUS VIVOS
            let tieneVirusVivoProximo = false;
            PNI.forEach(v => {
                if (v.gen && gen !== "todos" && v.gen !== gen) return;
                if (v.rapanui && !isRapaNui) return;

                const fechaHito = new Date(dob.getTime());
                fechaHito.setMonth(fechaHito.getMonth() + v.meses);
                const anioHito = fechaHito.getFullYear();
                const vigente = (!v.inicio || anioHito >= v.inicio) && (!v.fin || anioHito <= v.fin);
                const diff = v.meses - edad.totalMeses;

                if (diff >= 0 && diff <= 3) {
                    proy.push(`<b>${v.n}</b> (en ${diff} meses)`);
                    if (v.vivo) tieneVirusVivoProximo = true;
                } else if (v.pni) {
                    vigente ? pasadas.push(`${v.n}`) : brechas.push(`${v.n} (No era PNI en ${anioHito})`);
                }
            });

            if (tieneVirusVivoProximo) {
                alertas.push(`<div class="bg-red-100 text-red-800 p-2 text-[9px] rounded border-l-4 border-red-600"><strong>REGLA VIRUS VIVOS:</strong> El paciente tiene vacunas de virus vivo próximamente. Si no se administran el mismo día, separar por 28 días.</div>`);
            }

            // 3. FIEBRE AMARILLA & SRP VIAJERO (Igual que antes)
            if (isViajero && !isRapaNui) campanas.push("Fiebre Amarilla (Viajero: No PNI)");
            if (isViajero && edad.totalMeses >= 6 && edad.totalMeses < 12) alertas.push(`<div class="bg-orange-100 text-orange-800 p-2 text-[9px] rounded font-bold italic">✈️ REQUIERE DOSIS CERO SRP POR VIAJE</div>`);

            // RENDERIZADO
            document.getElementById('box-alertas-criticas').innerHTML = alertas.join('');
            document.getElementById('box-alertas-criticas').classList.toggle('hidden', alertas.length === 0);
            document.getElementById('list-campana').innerHTML = campanas.map(c => `<li>• ${c}</li>`).join('') || "<li>No aplica campaña actual</li>";
            document.getElementById('list-proyeccion').innerHTML = proy.map(p => `<li>${p}</li>`).join('');
            document.getElementById('list-brecha').innerHTML = brechas.map(b => `<li>${b}</li>`).join('');
            document.getElementById('list-pasadas').innerHTML = pasadas.map(p => `<li>✅ ${p}</li>`).join('');
        }
    </script>
</body>
</html>
