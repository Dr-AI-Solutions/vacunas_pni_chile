<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatVax - Auditoría PNI Chile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans text-slate-800">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-slate-900">
        
        <div class="bg-slate-900 p-5 text-white shadow-inner">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-indigo-400">
                        StatVax <span class="text-white font-light italic text-lg">CL</span>
                    </h1>
                    <p id="display-edad" class="text-slate-400 text-[10px] font-mono mt-1 uppercase tracking-widest">
                        Seleccione fecha de nacimiento
                    </p>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] bg-indigo-900 text-indigo-200 px-2 py-0.5 rounded-full border border-indigo-700 mb-1">
                        v2.3 Stable
                    </span>
                    <span class="text-[8px] text-slate-500 font-bold uppercase tracking-tighter">
                        Powered by Dr. AI Solutions
                    </span>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-6 space-y-6">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Fecha de Nacimiento</label>
                    <input type="date" id="dob" onchange="auditar()" class="w-full p-3 border-2 border-indigo-100 rounded-lg focus:border-indigo-500 outline-none transition-all text-sm font-bold">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <select id="genero" onchange="auditar()" class="p-2 bg-white border rounded text-xs">
                        <option value="todos">Género: Todos</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                    </select>
                    <div class="flex items-center space-x-2 bg-white p-2 border rounded">
                        <input type="checkbox" id="esRapaNui" onchange="auditar()">
                        <label class="text-[9px] font-black uppercase">Rapa Nui</label>
                    </div>
                    <div class="flex items-center space-x-2 bg-white p-2 border rounded">
                        <input type="checkbox" id="esViajero" onchange="auditar()">
                        <label class="text-[9px] font-black uppercase text-orange-600">Viaje Endémico</label>
                    </div>
                </div>
            </div>

            <div id="resultados" class="hidden space-y-5">
                
                <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg shadow-sm">
                    <h3 class="text-amber-800 font-black text-xs uppercase mb-3 underline">📅 Próximas Dosis e Indicaciones</h3>
                    <div id="list-proyeccion" class="space-y-3 text-xs"></div>
                </div>

                <div id="box-vph" class="bg-slate-800 text-white p-4 rounded-xl shadow-lg border-b-4 border-indigo-500">
                    <h3 class="font-black text-xs uppercase flex items-center"><span class="mr-2">💉</span> Indicación VPH (Catch-up)</h3>
                    <p id="vph-mensaje" class="text-[11px] mt-2 leading-relaxed opacity-90 font-medium"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-red-50 border-t-2 border-red-500 p-3 rounded-b-lg">
                        <h3 class="text-red-800 font-black text-[10px] uppercase mb-2">🚫 Brecha PNI</h3>
                        <p class="text-[8px] text-red-400 mb-2 italic">No era parte del PNI en el año correspondiente.</p>
                        <ul id="list-brecha" class="text-[10px] text-red-900 space-y-1 list-disc pl-4"></ul>
                    </div>
                    <div class="bg-emerald-50 border-t-2 border-emerald-500 p-3 rounded-b-lg">
                        <h3 class="text-emerald-800 font-black text-[10px] uppercase mb-2">✅ PNI al Día (Histórico)</h3>
                        <ul id="list-pasadas" class="text-[9px] text-emerald-700 space-y-0.5 list-none font-medium"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // BASE DE DATOS CRONOLÓGICA PNI CHILE
        const PNI = [
            { n: "BCG (Tuberculosis)", meses: 0, inicio: 1980, pni: true },
            { n: "Hepatitis B (RN)", meses: 0, inicio: 2005, pni: true },
            { n: "Nirsevimab (VRS)", meses: 0, inicio: 2024, pni: true },
            { n: "DPT + Polio Sabin", meses: 2, fin: 2004, pni: true },
            { n: "Pentavalente + Polio Sabin", meses: 2, inicio: 2005, fin: 2017, pni: true },
            { n: "Hexavalente", meses: 2, inicio: 2018, pni: true },
            { n: "Neumocócica (Refuerzo)", meses: 12, inicio: 2011, pni: true },
            { n: "Tres Vírica (SRP 1ra)", meses: 12, inicio: 1990, pni: true },
            { n: "Meningocócica ACWY", meses: 12, inicio: 2014, pni: true },
            { n: "Hepatitis A", meses: 18, inicio: 2018, pni: true },
            { n: "Varicela (1ra)", meses: 18, inicio: 2020, pni: true },
            { n: "Fiebre Amarilla (PNI)", meses: 18, rapanui: true, pni: true },
            { n: "Tres Vírica (SRP 2da)", meses: 36, inicio: 2023, pni: true },
            { n: "Varicela (2da)", meses: 36, inicio: 2023, pni: true },
            { n: "Refuerzo BCG (6 años)", meses: 72, fin: 2005, pni: true },
            { n: "VPH (4° Básico)", meses: 108, inicio: 2014, gen: "femenino", pni: true },
            { n: "VPH (4° Básico)", meses: 108, inicio: 2019, gen: "masculino", pni: true },
            { n: "dTpa (8° Básico)", meses: 156, inicio: 2012, pni: true }
        ];

        function getEdadExacta(dob, hoy) {
            let anios = hoy.getFullYear() - dob.getFullYear();
            let meses = hoy.getMonth() - dob.getMonth();
            let dias = hoy.getDate() - dob.getDate();
            if (dias < 0) { 
                meses--; 
                dias += new Date(hoy.getFullYear(), hoy.getMonth(), 0).getDate(); 
            }
            if (meses < 0) { 
                anios--; 
                meses += 12; 
            }
            return { anios, meses, dias, totalMeses: (anios * 12) + meses };
        }

        function auditar() {
            const dobVal = document.getElementById('dob').value;
            if (!dobVal) return;

            const dob = new Date(dobVal + "T12:00:00");
            const hoy = new Date();
            const edad = getEdadExacta(dob, hoy);
            
            // Mostrar resultados y edad
            document.getElementById('display-edad').innerText = `Edad: ${edad.anios}a, ${edad.meses}m, ${edad.dias}d`;
            document.getElementById('resultados').classList.remove('hidden');

            const gen = document.getElementById('genero').value;
            const esRapaNui = document.getElementById('esRapaNui').checked;
            const esViajero = document.getElementById('esViajero').checked;
            
            const proy = { "30d": [], "60d": [], "90d": [], "6m": [] };
            const brechas = [], pasadas = [];

            PNI.forEach(v => {
                if (v.gen && gen !== "todos" && v.gen !== gen) return;
                if (v.rapanui && !esRapaNui) return;

                const fechaHito = new Date(dob.getTime());
                fechaHito.setMonth(fechaHito.getMonth() + v.meses);
                const anioHito = fechaHito.getFullYear();

                const vigenteEnSuMomento = (!v.inicio || anioHito >= v.inicio) && (!v.fin || anioHito <= v.fin);
                const diff = v.meses - edad.totalMeses;

                if (diff >= 0) {
                    // Futuro
                    if (vigenteEnSuMomento) {
                        if (diff <= 1) proy["30d"].push(v.n);
                        else if (diff <= 2) proy["60d"].push(v.n);
                        else if (diff <= 3) proy["90d"].push(v.n);
                        else if (diff <= 6) proy["6m"].push(v.n);
                    }
                } else {
                    // Pasado
                    if (v.pni) {
                        if (vigenteEnSuMomento) pasadas.push(`${v.n} (${anioHito})`);
                        else if (v.inicio && anioHito < v.inicio) brechas.push(`${v.n} (No existía en ${anioHito})`);
                    }
                }
            });

            // Lógica Extra Fiebre Amarilla
            if (esViajero && !esRapaNui) {
                proy["30d"].push("<span class='text-orange-600 font-bold'>Fiebre Amarilla (Viajero - Privada)</span>");
            }

            // Lógica VPH Catch-up
            let vphMsg = "";
            const esPNIVPH = (gen === "femenino" && dob.getFullYear() >= 2005) || (gen === "masculino" && dob.getFullYear() >= 2010);
            if (edad.totalMeses >= 108) {
                if (!esPNIVPH) {
                    const esquema = (edad.anios < 15) ? "2 dosis (0 y 6 meses)" : "3 dosis (0, 2 y 6 meses)";
                    vphMsg = `Paciente fuera de cohorte PNI. Recomendación por utilidad clínica: ${esquema}.`;
                } else {
                    vphMsg = "Paciente en cohorte PNI. Verificar registro escolar de 4° y 5° Básico.";
                }
            } else { vphMsg = "Pendiente por edad (ingreso a los 9 años / 4° Básico)."; }
            document.getElementById('vph-mensaje').innerText = vphMsg;

            // RENDERIZADO
            const renderProg = (t, l, c) => l.length ? `<div class="mb-2"><span class="font-bold text-[9px] ${c} block uppercase underline">${t}</span><ul class="list-disc pl-4">${l.map(x => `<li>${x}</li>`).join('')}</ul></div>` : "";
            
            document.getElementById('list-proyeccion').innerHTML = 
                renderProg("Inminente (30 días)", proy["30d"], "text-red-600") +
                renderProg("En 60 días", proy["60d"], "text-orange-600") +
                renderProg("En 90 días", proy["90d"], "text-blue-600") +
                renderProg("Próximos 6 meses", proy["6m"], "text-indigo-600");

            document.getElementById('list-brecha').innerHTML = brechas.map(b => `<li>${b}</li>`).join('');
            document.getElementById('list-pasadas').innerHTML = pasadas.map(p => `<li>✅ ${p}</li>`).join('');
        }
    </script>
</body>
</html>
