<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatVax v4.0 - Buscador de Riesgos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans text-slate-800">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-slate-900">
        
        <div class="bg-slate-900 p-5 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black text-indigo-400 tracking-tighter italic">StatVax <span class="text-white font-light">CL</span></h1>
                    <p id="display-edad" class="text-slate-400 text-[10px] font-mono mt-1 uppercase tracking-widest italic">Soporte de Decisión Clínica</p>
                </div>
                <div class="text-right">
                    <span class="text-[9px] bg-indigo-900 px-2 py-1 rounded-full border border-indigo-700 font-bold text-indigo-200 uppercase">v4.0 Alpha</span>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-6 space-y-4">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Fecha de Nacimiento</label>
                        <input type="date" id="dob" onchange="auditar()" class="w-full p-2 border-2 border-indigo-100 rounded-lg text-sm font-bold shadow-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Género</label>
                        <select id="genero" onchange="auditar()" class="w-full p-2 border-2 border-indigo-100 rounded-lg text-sm bg-white">
                            <option value="todos">Seleccionar...</option>
                            <option value="femenino">Femenino</option>
                            <option value="masculino">Masculino</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Condición de Riesgo Especial</label>
                        <select id="condicionRiesgo" onchange="auditar()" class="w-full p-2 border-2 border-indigo-100 rounded-lg text-[11px] bg-white text-indigo-800 font-medium">
                            <option value="ninguna">-- Ninguna / Sano --</option>
                            <optgroup label="Respiratorio">
                                <option value="asma">Asma Grave / Obstrucción Crónica</option>
                                <option value="fibrosis">Fibrosis Quística</option>
                            </optgroup>
                            <optgroup label="Cardiaco">
                                <option value="congenita">Cardiopatía Congénita</option>
                                <option value="hipertension">Hipertensión Arterial Crónica</option>
                            </optgroup>
                            <optgroup label="Inmunológico / Otros">
                                <option value="vih">VIH / Inmunodeficiencias</option>
                                <option value="cancer">Cáncer en tratamiento</option>
                                <option value="diabetes">Diabetes Mellitus</option>
                                <option value="prematuro">Prematuro extremas (<32s / <1.5kg)</option>
                                <option value="prep">Usuario PrEP (Mpox)</option>
                            </optgroup>
                            <optgroup label="Especiales">
                                <option value="embarazo">Gestante</option>
                                <option value="salud">Personal de Salud</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div class="flex gap-4 mt-4 border-t pt-3">
                    <label class="flex items-center space-x-2 text-[10px] font-bold"><input type="checkbox" id="esViajero" onchange="auditar()"> <span>VIAJE ENDÉMICO</span></label>
                    <label class="flex items-center space-x-2 text-[10px] font-bold"><input type="checkbox" id="esRapaNui" onchange="auditar()"> <span>RESIDENCIA RAPA NUI</span></label>
                </div>
            </div>

            <div id="resultados" class="hidden space-y-4">
                
                <div id="box-campanas" class="bg-indigo-900 text-white p-4 rounded-xl shadow-lg border-b-4 border-indigo-700">
                    <h3 class="text-xs font-black uppercase mb-3 flex items-center border-b border-indigo-400 pb-1 italic">
                        📢 Reporte de Campañas (Riesgos Detectados)
                    </h3>
                    <div id="list-campana" class="text-[11px] space-y-2 font-medium"></div>
                </div>

                <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg">
                    <h3 class="text-amber-800 font-black text-xs uppercase mb-2 underline italic">📅 Próximas PNI Sugeridas</h3>
                    <div id="list-proyeccion" class="text-[11px] space-y-1"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-red-50 border-t-4 border-red-500 p-3 rounded-b-xl">
                        <h3 class="text-red-800 font-black text-[10px] uppercase mb-1">🚫 Brechas de Inmunización</h3>
                        <ul id="list-brecha" class="text-[10px] text-red-900 list-disc pl-4 font-bold"></ul>
                    </div>
                    <div class="bg-emerald-50 border-t-4 border-emerald-500 p-3 rounded-b-xl">
                        <h3 class="text-emerald-800 font-black text-[10px] uppercase mb-1">✅ Historial PNI Estimado</h3>
                        <div id="list-pasadas" class="text-[9px] text-emerald-700 font-medium"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MAPEO DE RIESGOS (BASE DE DATOS CLÍNICA)
        const MAPA_RIESGOS = {
            "asma": ["Influenza", "COVID-19"],
            "fibrosis": ["Influenza", "COVID-19", "Neumocócica Extra"],
            "congenita": ["Influenza", "COVID-19", "Nirsevimab (VRS)"],
            "hipertension": ["Influenza", "COVID-19"],
            "vih": ["Influenza", "COVID-19", "Mpox", "Hepatitis B Refuerzo"],
            "cancer": ["Influenza", "COVID-19", "Mpox"],
            "diabetes": ["Influenza", "COVID-19"],
            "prematuro": ["Nirsevimab (VRS)", "Esquema Prematuro Neumocócica"],
            "prep": ["Mpox"],
            "embarazo": ["Influenza", "COVID-19", "dTpa (desde 28 sem)"],
            "salud": ["Influenza", "COVID-19", "Mpox", "Hepatitis B"]
        };

        const PNI = [
            { n: "BCG (Tuberculosis)", meses: 0, inicio: 1980, pni: true },
            { n: "Hepatitis B (RN)", meses: 0, inicio: 2005, pni: true },
            { n: "Hexavalente", meses: 2, inicio: 2018, pni: true },
            { n: "Tres Vírica (SRP 1ra)", meses: 12, inicio: 1990, pni: true },
            { n: "Hepatitis A", meses: 18, inicio: 2018, pni: true },
            { n: "Varicela (1ra)", meses: 18, inicio: 2020, pni: true },
            { n: "Fiebre Amarilla", meses: 18, rapanui: true, pni: true },
            { n: "VPH", meses: 108, inicio: 2014, gen: "femenino" },
            { n: "VPH", meses: 108, inicio: 2019, gen: "masculino" }
        ];

        function getEdadExacta(dob, hoy) {
            let anios = hoy.getFullYear() - dob.getFullYear();
            let meses = hoy.getMonth() - dob.getMonth();
            let dias = hoy.getDate() - dob.getDate();
            if (dias < 0) { meses--; dias += new Date(hoy.getFullYear(), hoy.getMonth(), 0).getDate(); }
            if (meses < 0) { anios--; meses += 12; }
            return { anios, meses, dias, totalMeses: (anios * 12) + meses };
        }

        function auditar() {
            const dobVal = document.getElementById('dob').value;
            if (!dobVal) return;
            const dob = new Date(dobVal + "T12:00:00");
            const hoy = new Date();
            const edad = getEdadExacta(dob, hoy);
            document.getElementById('display-edad').innerText = `Edad: ${edad.anios}a, ${edad.meses}m, ${edad.dias}d`;
            document.getElementById('resultados').classList.remove('hidden');

            const condicion = document.getElementById('condicionRiesgo').value;
            const isViajero = document.getElementById('esViajero').checked;
            const isRapaNui = document.getElementById('esRapaNui').checked;
            const gen = document.getElementById('genero').value;

            const campanas = [], proy = [], brechas = [], pasadas = [];

            // 1. CRUCE DINÁMICO DE RIESGOS
            // Por edad
            if (edad.totalMeses >= 6 && edad.totalMeses <= 132) campanas.push("Influenza (Grupo Escolar)");
            if (edad.anios >= 60) campanas.push("Influenza y COVID-19 (Adulto Mayor)");
            
            // Por condición seleccionada
            if (condicion !== "ninguna" && MAPA_RIESGOS[condicion]) {
                MAPA_RIESGOS[condicion].forEach(v => {
                    campanas.push(`${v} <span class="opacity-60 text-[9px] block">Motivo: Criterio clínico por ${condicion.toUpperCase()}</span>`);
                });
            }

            // Nirsevimab automático
            if (edad.totalMeses <= 6 || (condicion === "prematuro" && edad.totalMeses <= 24)) {
                campanas.push("Nirsevimab (VRS) <span class='text-blue-300'>[Campaña Invierno 2026]</span>");
            }

            // 2. AUDITORÍA PNI
            PNI.forEach(v => {
                if (v.gen && gen !== "todos" && v.gen !== gen) return;
                if (v.rapanui && !isRapaNui) return;

                const fechaHito = new Date(dob.getTime());
                fechaHito.setMonth(fechaHito.getMonth() + v.meses);
                const anioHito = fechaHito.getFullYear();
                const vigente = (!v.inicio || anioHito >= v.inicio) && (!v.fin || anioHito <= v.fin);
                const diff = v.meses - edad.totalMeses;

                if (diff >= 0 && diff <= 6) {
                    if (vigente) proy.push(`• ${v.n} (en ${diff} m)`);
                } else if (v.pni) {
                    if (vigente) pasadas.push(`${v.n} (${anioHito})`);
                    else if (v.inicio && anioHito < v.inicio) brechas.push(`${v.n} (En ${anioHito} no era PNI)`);
                }
            });

            // 3. VIAJERO
            if (isViajero) {
                if (edad.totalMeses >= 6 && edad.totalMeses < 12) campanas.push("SRP Dosis Cero (Protocolo Viajero)");
                if (!isRapaNui) campanas.push("Fiebre Amarilla (Viaje: Sugerir compra)");
            }

            // RENDER
            document.getElementById('list-campana').innerHTML = campanas.map(c => `<li>• ${c}</li>`).join('') || "<li>No se detectan riesgos específicos.</li>";
            document.getElementById('list-proyeccion').innerHTML = proy.map(p => `<div>${p}</div>`).join('') || "Sin vacunas PNI próximas.";
            document.getElementById('list-brecha').innerHTML = brechas.map(b => `<li>${b}</li>`).join('');
            document.getElementById('list-pasadas').innerHTML = pasadas.map(p => `<div>✅ ${p}</div>`).join('');
        }
    </script>
</body>
</html>
